name: Support Ops Automation CI

on:
  push:
    paths:
      - "Support-Ops-Automation/**"
      - ".github/workflows/support-ops-ci.yml"
  pull_request:
    paths:
      - "Support-Ops-Automation/**"
      - ".github/workflows/support-ops-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Support-Ops-Automation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest
