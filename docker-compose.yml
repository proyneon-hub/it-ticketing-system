services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 5000
      AUTH_SECRET: local-compose-secret
      MONGODB_URI: mongodb://mongo:27017/it_ticketing
    ports:
      - "5000:5000"

volumes:
  mongo-data:
